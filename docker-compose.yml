services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      - VITE_WS_URL=ws://localhost:8080/ws
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend
